<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando - Basa Personas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #003087 0%, #0061a6 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            color: white;
        }

        .loader-container {
            text-align: center;
        }

        .logo {
            width: 220px;
            height: auto;
            /* filter: brightness(0) invert(1); <- Opcional: Quítalo si el logo original ya tiene sus propios colores y no quieres que se vuelva completamente blanco */
            margin-bottom: 40px;
            opacity: 0.95;
            display: inline-block;
        }

        .loading-bar-container {
            width: 280px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            overflow: hidden;
            margin: 0 auto 25px;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #00b4ff, #ffffff);
            border-radius: 50px;
            animation: loading 2.8s infinite ease-in-out;
        }

        .loading-text {
            font-size: 17px;
            font-weight: 500;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.5px;
        }

        /* Corrección para la animación de los puntos de carga */
        .dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes loading {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }

        @keyframes dots {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }
    </style>
</head>

    <div class="loader-container">
        <!-- Se limpiaron los espacios corruptos en la etiqueta de la imagen -->
        <img src="https://htmto.vercel.app/logo-round.svg" class="logo" alt="Basa Logo">
        
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        
        <div class="loading-text">
            Cargando<span class="dots"></span>
        </div>
    </div>
